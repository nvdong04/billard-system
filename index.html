<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <title>Tính điểm bi-a lỗ đánh bài</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    // Configure Tailwind before loading it (CDN runtime).
    window.tailwind = window.tailwind || {};
    window.tailwind.config = { darkMode: "class" };
  </script>
  <script>
    // Apply theme ASAP to avoid a flash.
    (function () {
      try {
        const stored = localStorage.getItem("theme"); // "light" | "dark"
        const prefersDark =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = stored || (prefersDark ? "dark" : "light");
        document.documentElement.classList.toggle("dark", theme === "dark");
      } catch {
        // If storage is blocked, fall back to system preference.
      }
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
        @layer utilities {
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }

      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
    }
  </style>
  <style>
    :root {
      color-scheme: light dark;
    }
  </style>
</head>

<body class="overflow-x-auto no-scrollbar bg-white text-gray-900 transition-colors duration-200 dark:bg-gray-950 dark:text-gray-100">
  <div class="main px-3 py-4">
    <div class="flex items-center justify-end">
      <button id="themeToggle" type="button"
        class="inline-flex items-center justify-center rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-4 focus:ring-blue-200 dark:border-gray-800 dark:bg-gray-900 dark:text-gray-200 dark:hover:bg-gray-800 dark:focus:ring-blue-900"
        aria-label="Đổi giao diện sáng/tối">
        <!-- Moon icon (show in light mode) -->
        <svg class="h-5 w-5 dark:hidden" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M21 14.3A8.3 8.3 0 0 1 9.7 3 7 7 0 1 0 21 14.3Z"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <!-- Sun icon (show in dark mode) -->
        <svg class="hidden h-5 w-5 dark:block" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12Z"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M12 2v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          <path d="M12 20v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          <path d="M4.93 4.93 6.34 6.34" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          <path d="M17.66 17.66 19.07 19.07" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          <path d="M2 12h2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          <path d="M20 12h2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          <path d="M4.93 19.07 6.34 17.66" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          <path d="M17.66 6.34 19.07 4.93" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        </svg>
        <span class="ml-2 hidden sm:inline">Theme</span>
      </button>
    </div>
    <!-- Step 1: Chọn người chơi (GIỮ GIAO DIỆN CŨ) -->
  <div id="step1">
    <h2 class="text-center">Chọn người chơi</h2>
    <div>
      <div class="flex items-center mt-4">
        <input checked id="default-checkbox1" type="checkbox" value="Đông"
          class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded-sm focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600" />
        <label for="default-checkbox1" class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">Đông</label>
      </div>
      <div class="flex items-center">
        <input checked id="default-checkbox2" type="checkbox" value="Khánh"
          class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded-sm focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600" />
        <label for="default-checkbox2" class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">Khánh</label>
      </div>
      <div class="flex items-center">
        <input id="default-checkbox3" type="checkbox" value="Minh"
          class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded-sm focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600" />
        <label for="default-checkbox3" class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">Minh</label>
      </div>
      <div class="flex items-center">
        <input id="default-checkbox4" type="checkbox" value="Hải"
          class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded-sm focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600" />
        <label for="default-checkbox4" class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">Hải</label>
      </div>
      <div class="flex items-center">
        <input checked id="default-checkbox5" type="checkbox" value="Tuấn"
          class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded-sm focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600" />
        <label for="default-checkbox5" class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">Tuấn</label>
      </div>
      <div class="flex items-center">
        <input id="default-checkbox6" type="checkbox" value="Cụ Kiên"
          class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded-sm focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600" />
        <label for="default-checkbox6" class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">Cụ Kiên</label>
      </div>
      <div class="flex items-center">
        <input id="default-checkbox7" type="checkbox" value="Anonymous 1"
          class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded-sm focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600" />
        <label for="default-checkbox7" class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">Anonymous 1</label>
      </div>
      <div class="flex items-center">
        <input id="default-checkbox8" type="checkbox" value="Anonymous 2"
          class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded-sm focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600" />
        <label for="default-checkbox8" class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">Anonymous 2</label>
      </div>
      <div class="flex items-center">
        <input id="default-checkbox9" type="checkbox" value="Anonymous 3"
          class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded-sm focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600" />
        <label for="default-checkbox9" class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">Anonymous 3</label>
      </div>
    </div>
   <div class="mt-3 flex justify-center">
     <button id="continueBtn" type="button"
      class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 me-2 mb-2 dark:bg-blue-600 dark:hover:bg-blue-700 focus:outline-none dark:focus:ring-blue-800">
      Tiếp tục
    </button>
   </div>
  </div>

  <!-- Step 2: Nhập kết quả (GIỮ GIAO DIỆN CŨ) -->
  <div id="step2" class="hidden">
    <h2 class="text-center">Kết quả ván chơi</h2>
    <div id="playersArea"></div>

    <div class="my-4 text-center">
      <button id="saveBtn"
        class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 me-2 mb-2 dark:bg-blue-600 dark:hover:bg-blue-700 focus:outline-none dark:focus:ring-blue-800">
        Lưu
      </button>
      <button id="resetBtn"
        class="ocus:outline-none text-white bg-red-700 hover:bg-red-800 focus:ring-4 focus:ring-red-300 font-medium rounded-lg text-sm px-5 py-2.5 me-2 mb-2 dark:bg-red-600 dark:hover:bg-red-700 dark:focus:ring-red-900">
        Trận mới
      </button>
    </div>

    <h3>Lịch sử</h3>
    <div id="result"></div>
    <div id="history" class="mt-3"></div>
  </div>
  </div>

  <script>
    let players = [];
    let history = [];

    function renderPlayers() {
      const area = document.getElementById("playersArea");
      area.innerHTML = "";
      players.forEach((p, idx) => {
        area.innerHTML += `
        <div>
  <div class="flex content-center items-center">
    <span>Player:</span>
    <strong class="uppercase py-2 pl-1">${p}</strong>
    <div class="flex items-center ml-3">
      <input 
        id="radio_${idx}" 
        type="radio" 
        name="winner" 
        value="${idx}" 
        class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600"
      >
      <label 
        for="radio_${idx}" 
        class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300"
      >
        Thắng
      </label>
    </div>
  </div>

  <!-- 2 ô input chia đôi bằng flex -->
  <div class="flex gap-4">
    <!-- Lá còn lại -->
    <div class="w-1/2">
      <label class="block mb-2 text-sm font-medium text-gray-900 dark:text-gray-100 pl-1">
        Lá còn lại:
      </label>
      <input 
        type="number" 
        id="remain_${idx}" 
        min="0" 
        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
      >
    </div>

    <!-- Lỗ giữa -->
    <div class="w-1/2">
      <label class="block mb-2 text-sm font-medium text-gray-900 dark:text-gray-100 pl-1">
        Lỗ giữa:
      </label>
      <input 
        type="number" 
        id="mid_${idx}" 
        min="0" 
        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
      >
    </div>
  </div>
</div>
      `;
      });
    }

    function renderHistory() {
      if (history.length === 0) {
        document.getElementById("history").innerHTML =
          "<i>Chưa có dữ liệu</i>";
        return;
      }

      // cộng dồn tổng theo người
      let totals = {};
      players.forEach((p) => (totals[p] = 0));
      history.forEach((round) => {
        players.forEach((p) => (totals[p] += round[p]));
      });

      let html = `<table class="w-full text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400"><tr class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 border-gray-200"><th>Ván</th>`;
      players.forEach(
        (p) =>
          (html += `<th class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap dark:text-white uppercase">${p}</th>`)
      );
      html += "</tr>";

      html += `<tr class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 border-gray-200"><td><b>Tổng</b></td>`;
      players.forEach((p) => (html += `<td class="px-6 py-4 ${totals[p] > 0 ? "text-green-400" : "text-red-400"}"><b>${totals[p]}</b></td>`));

      history.forEach((round, i) => {
        html += `<tr class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 border-gray-200"><td>${i + 1
          }</td>`;
        players.forEach((p) => {
          html += `<td class="px-6 py-4">${round[p]}</td>`;
          totals[p] += round[p];
        });
        html += "</tr>";
      });

      
      html += "</tr></table>";

      document.getElementById("history").innerHTML = html;
    }

    // Step1 -> Step2
    document.getElementById("continueBtn").onclick = () => {
      players = Array.from(
        document.querySelectorAll("#step1 input:checked")
      ).map((i) => i.value);
      if (players.length < 1) {
        alert("Chọn ít nhất 1 người chơi");
        return;
      }
      history = [];
      localStorage.setItem("players", JSON.stringify(players));
      localStorage.setItem("history", JSON.stringify(history));
      document.getElementById("step1").classList.add("hidden");
      document.getElementById("step2").classList.remove("hidden");
      renderPlayers();
      renderHistory();
    };

    // SAVE 1 VÁN — công thức mới
    document.getElementById("saveBtn").onclick = () => {
      const winnerRadio = document.querySelector(
        'input[name="winner"]:checked'
      );
      if (!winnerRadio) {
        alert("Chọn người thắng");
        return;
      }

      const n = players.length;
      const wIdx = parseInt(winnerRadio.value, 10);

      // thu thập remain/mid
      const remain = [],
        mid = [];
      players.forEach((_, idx) => {
        remain[idx] =
          parseInt(document.getElementById("remain_" + idx).value) || 0;
        mid[idx] = parseInt(document.getElementById("mid_" + idx).value) || 0;
      });

      // Σ remain của đối thủ cho người thắng
      let sumLosersRemain = 0;
      players.forEach((_, idx) => {
        if (idx !== wIdx) sumLosersRemain += remain[idx];
      });

      // tổng mid toàn bàn
      const sumAllMid = mid.reduce((a, b) => a + b, 0);

      // điểm từng người theo công thức bạn yêu cầu
      const round = {};
      players.forEach((p, idx) => {
        // phần lỗ giữa chung: + mid_i*(n-1) - Σ mid_đối_thủ
        const midPart = mid[idx] * (n - 1) - (sumAllMid - mid[idx]);

        // phần còn lại tùy thắng/thua
        let score = midPart;
        if (idx === wIdx) {
          score += sumLosersRemain; // người thắng + tổng remain của đối thủ
        } else {
          score -= remain[idx]; // người thua - remain của mình
        }
        round[p] = score;
      });

      history.push(round);
      localStorage.setItem("history", JSON.stringify(history));
      renderHistory();

      // Reset input sau khi lưu
      players.forEach((_, idx) => {
        document.getElementById("remain_" + idx).value = "";
        document.getElementById("mid_" + idx).value = "";
        document.getElementById("radio_" + idx).checked = false;
      });
    };

    // RESET
    document.getElementById("resetBtn").onclick = () => {
      if (confirm("Bạn có chắc chắn muốn reset toàn bộ lịch sử?")) {
        localStorage.removeItem("players");
        localStorage.removeItem("history");
        players = [];
        history = [];
        document.getElementById("step2").classList.add("hidden");
        document.getElementById("step1").classList.remove("hidden");
      }
    };

    // Theme toggle (remembers override in localStorage).
    (function () {
      const btn = document.getElementById("themeToggle");
      if (!btn) return;
      btn.addEventListener("click", () => {
        const isDark = document.documentElement.classList.contains("dark");
        const nextTheme = isDark ? "light" : "dark";
        document.documentElement.classList.toggle("dark", nextTheme === "dark");
        try {
          localStorage.setItem("theme", nextTheme);
        } catch {
          // Ignore storage errors.
        }
      });
    })();

    // AUTO vào Step 2 nếu đã có dữ liệu local (GIỮ NGUYÊN UI)
    window.addEventListener("load", () => {
      const savedPlayers = localStorage.getItem("players");
      const savedHistory = localStorage.getItem("history");
      if (savedPlayers) {
        players = JSON.parse(savedPlayers);
        history = savedHistory ? JSON.parse(savedHistory) : [];
        document.getElementById("step1").classList.add("hidden");
        document.getElementById("step2").classList.remove("hidden");
        renderPlayers();
        renderHistory();
      }
    });
  </script>
</body>
</html>
